name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # Only trigger if files in the backend folder change

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy backend files to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "backend"
        target: "~/app"

    - name: Install dependencies and restart PM2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app/backend
          # Create .env file with secrets
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env
          echo "LLM_PROVIDER=gemini" >> .env
          echo "PORT=3001" >> .env
          
          # Install dependencies
          npm install --production
          
          # Start or restart the Node.js process via PM2
          pm2 restart antigravity-backend || pm2 start server.js --name antigravity-backend
          pm2 save
